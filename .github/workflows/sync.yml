name: Sync Upstream Plugins

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run sync pipeline
        run: bun run sync

      - name: Detect sync changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --short -- marketplace.json data/sync-state.json plugins/)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git author
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create commit and pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_NAME: sync/upstream-plugins-${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git checkout -b "$BRANCH_NAME"
          if [[ -d plugins ]]; then
            git add -f plugins/
          fi
          git add marketplace.json data/sync-state.json
          git commit -m "chore: sync upstream plugins"
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "chore: sync upstream plugins" \
            --body "Automated sync of upstream plugin repositories."
