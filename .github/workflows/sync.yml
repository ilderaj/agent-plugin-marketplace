name: Sync Upstream Plugins

on:
  # To change sync frequency, enable the desired cron line below and disable the other.
  # Switching frequency is done by editing the cron lines here, NOT by changing the
  # `schedule` input at dispatch time (that input is informational only).
  schedule:
    - cron: "0 3 * * 1"   # weekly: every Monday at 03:00 UTC
    # - cron: "0 3 * * *" # daily: every day at 03:00 UTC (uncomment to enable)
  workflow_dispatch:
    inputs:
      schedule:
        description: "Informational label for this run's cadence (does not change the cron trigger)"
        required: false
        default: "on-demand"
        type: choice
        options:
          - weekly
          - daily
          - on-demand

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run sync pipeline
        env:
          SYNC_REPORT_PATH: ${{ runner.temp }}/sync-report.md
        run: bun run sync

      - name: Detect sync changes
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --short -- marketplace.json .github/plugin/marketplace.json data/sync-state.json plugins/)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git author
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create commit and pull request
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true'
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_NAME: sync/upstream-plugins-${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
          SYNC_REPORT_PATH: ${{ runner.temp }}/sync-report.md
        shell: bash
        run: |
          git checkout -b "$BRANCH_NAME"
          if [[ -d plugins ]]; then
            git add -f plugins/
          fi
          git add marketplace.json .github/plugin/marketplace.json data/sync-state.json
          git commit -m "chore: sync upstream plugins"
          git push --set-upstream origin "$BRANCH_NAME"

          if [[ -f "$SYNC_REPORT_PATH" ]]; then
            PR_BODY="$(cat "$SYNC_REPORT_PATH")"
          else
            PR_BODY="Automated sync of upstream plugin repositories."
          fi

          PR_URL=$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "chore: sync upstream plugins" \
            --body "$PR_BODY")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.create_pr.outputs.pr_url != '' && secrets.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured, skipping Slack notification"
            exit 0
          fi
          PAYLOAD=$(printf '{"text":"Plugin sync PR created: %s"}' "$PR_URL")
          curl --fail-with-body -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack notification failed (non-fatal)"

      - name: Notify Discord
        if: steps.create_pr.outputs.pr_url != '' && secrets.DISCORD_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "::warning::DISCORD_WEBHOOK_URL not configured, skipping Discord notification"
            exit 0
          fi
          PAYLOAD=$(printf '{"content":"Plugin sync PR created: %s"}' "$PR_URL")
          curl --fail-with-body -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL" \
            || echo "::warning::Discord notification failed (non-fatal)"
